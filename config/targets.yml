# vital-scans targets
#
# Each target is crawled and scanned incrementally across the week by the
# nightly scan workflow. Budgets keep individual GitHub Actions jobs short
# and keep load on target servers polite.
#
# Weekly coverage = pages_per_run x scheduled runs per week (see scan.yml).
# Budget is sized so each domain job finishes well under 2 hours (shorter,
# more robust runs): ~100 pages x ~11s/page ~= 18 min typical, with margin
# for slow pages under the 110-min job cap. The 5 weekly crons accumulate
# coverage: 100 x 5 ~= 500 pages/week/domain (more for higher importance).

defaults:
  pages_per_run: 150        # max pages scanned per domain per workflow run (keeps runs < 2h)
  max_pages_per_week: 5000  # hard weekly cap per domain
  delay_ms: 1500            # pause between page loads (politeness)
  nav_timeout_ms: 30000     # page navigation timeout
  settle_delay_ms: 1000     # wait after load + network-idle before auditing (avoids pre-hydration false positives)
  max_crawl_depth: 6        # BFS depth from seeds
  retention_weeks: 8        # page-level detail kept this long; weekly summaries kept forever
  user_agent: "vital-scans/0.1 (+https://github.com/mgifford/vital-core; accessibility and sustainability monitoring)"
  reporting:
    max_html_issues: 50
    moderate_issue_threshold_percent: 5
    include_key_page_issues: true
    # Heuristic threshold: findings on this many or more pages are flagged
    # "Likely template" (shared component). Findings on 1–2 pages are flagged
    # "Likely content". Between the two = "unknown".
    template_page_threshold: 10
  display:
    # How the accessibility score appears in per-domain reports and the archive.
    # letter  — letter grade only (A/B/C/D/F)
    # percent — numeric score only (e.g. "78")
    # both    — letter grade and numeric score (default)
    # none    — suppress the score section entirely
    score_format: both

# Which sustainability figure the reports headline: "co2" (grams CO2 per
# page) or "energy" (watt-hours per page). Both are always recorded in the
# data — this only changes what's shown, so switching needs no re-scan.
# The SWD model computes CO2 = energy x grid carbon intensity, so energy
# is the underlying physical quantity.
sustainability_metric: energy

# Base URL for published reports (used to generate absolute links in CSV exports
# so that affected_pages_csv cells are clickable in Google Sheets / Excel).
# Trailing slash is optional. Leave empty to keep CSV links relative.
report_base_url: "https://mgifford.github.io/vital-core"

# Report languages. Each report is rendered once per listed language; the
# `default_language` keeps the canonical (unsuffixed) file paths — e.g.
# accessibility.html — and every other language gets a locale suffix —
# accessibility-fr.html. A header language switcher cross-links them.
# Only UI chrome is translated (nav, labels, buttons, headings); engine-sourced
# text such as WCAG/axe rule descriptions stays English. Supported: en, fr, ja, nl.
# Translations are human-reviewed catalogs in src/locales/<lang>.json; any
# missing string falls back to English, so partial catalogs are safe.
# A target may override either key (e.g. Canada: languages: [en, fr]).
languages: [en]
default_language: en

# Per-engine weekly coverage rates. Each value is the share of the week's
# unique pages an engine runs on, as a fraction (0.3) or percent (30).
# 0 (or omitted) disables an engine. Selection is deterministic per page
# (a stable hash of page + engine + week), so coverage is reproducible
# and a given page tends to stay in or out of an engine's sample for the
# week. A target may override individual rates with its own `sampling:`.
#
# To add a future scanner, drop an engine module in src/engines/, wire it
# in scan.js, and add a rate line here — that's the single control point.
sampling:
  axe: 100             # WCAG / Section 508 (axe-core)
  alfa: 50             # independent ACT-rules audit (Siteimprove Alfa)
  plain-language: 50   # readability of main content
  link-check: 100       # broken-link probing of links seen on sampled pages
  lighthouse: 10       # performance / a11y / best-practices / SEO (own Chrome; slow)
  deprecated-html: 10 # obsolete/legacy HTML (<font>, <center>, etc.)
  resources: 100       # catalog PDFs, Office docs, iframes, embedded media
  images: 100           # inline <img> inventory: alt text, dimensions, file size
  standards: 50        # web standards / metadata / social (ScanGov-style, per page)
  security: 10         # HTTPS, security headers, security.txt, .gov TLD (per origin)
  public-interest: 10  # accessibility statement, carbon.txt, Green Web Foundation, sitemaps (per origin)
  sustainability: 10   # page weight + estimated CO2
  tech: 10             # technology detection (CMS, frameworks, CDNs, analytics) — small sample sufficient
  third-party: 25      # third-party JS/resource cost per page (load bytes/time + which origins serve scripts); varies per page, so sampled like sustainability

targets:
  # Discovery is host-scoped. The apex domain and its `www.` variant are
  # treated as the same site (so cdc.gov and www.cdc.gov are crawled
  # together), but any other subdomain is a distinct target
  # (data.cms.gov is separate from www.cms.gov).
  #
  # Per-target options (all optional):
  #   importance: 1-5 (default 3). Scales max_pages_per_week: 3 = the
  #     configured cap, 1 = a third (good for near-identical open-data
  #     sites), 5 = 5/3. Tune low-value domains down, key domains up.
  #   priority_urls_file: path to a file of top-task URLs (one per line,
  #     # comments ok — top-task-finder output). These are covered first
  #     every week, before the rest of the site is sampled. No URL is ever
  #     scanned more than once per ISO week.
  #   priority_urls: [ ... ] inline list, for a handful of must-cover URLs.
  #
  #   url_include: [ ... ] optional list of substrings. When set, ONLY URLs
  #     whose full normalized URL contains at least one substring are crawled
  #     and scanned. Useful for focusing a scan on a subtree or topic area.
  #     Examples:
  #       url_include: ["/children/"]          # only paths containing /children/
  #       url_include: ["medicare", "medicaid"] # either word in the URL
  #     Priority URLs always bypass this filter.
  #
  #   url_exclude: [ ... ] optional list of substrings. URLs whose full
  #     normalized URL contains any of these are silently skipped during
  #     crawl and scan. Applied after url_include. Useful for pruning noise
  #     or known-inaccessible paths that would skew results.
  #     Examples:
  #       url_exclude: ["press_release", "/news/", "?page="]
  #       url_exclude: ["/es/", "/zh/"]  # skip non-English language sections
  #     Priority URLs always bypass this filter.
  #
  #   spelling_allowlist: [ ... ] optional list of domain-specific terms that
  #     the spell checker should accept without flagging. Layered on top of
  #     config/spelling-allowlist.txt (project-wide). Useful for government
  #     program names, medical terms, and agency acronyms that aren't in a
  #     general English dictionary.
  #     Examples:
  #       spelling_allowlist: ["Medicaid", "FMAP", "CHIPRA", "MACRA"]
  #       spelling_allowlist: ["Sequestration", "Beneficiaries", "CMS"]
  #
  # WAF-blocked: hhs.gov and nih.gov return 403 "Access Denied" to
  # automated browsers and record as blocked with no audit data until the
  # scanner's user-agent is allowlisted. Kept in to track once access is
  # sorted — see WAF-ALLOWLIST.md for the request template and status.
  - domain: www.cms.gov
    importance: 5
    priority_urls_file: profiles/www.cms.gov-top-tasks.txt
  - domain: www.medicare.gov
    importance: 5
  - domain: www.medicaid.gov
    importance: 5
  - domain: data.healthcare.gov
    importance: 3                  # open-data site; pages are template-similar
  - domain: openpaymentsdata.cms.gov
    importance: 3                  # open-data site; lighthouse disabled (perf:6-55 → audits take 2-5 min each)
    sampling:
      lighthouse: 0
  - domain: www.cdc.gov
    importance: 1
  - domain: data.cms.gov
    importance: 3                  # open-data site
  - domain: data.medicaid.gov
    importance: 3                  # open-data site
  - domain: www.healthcare.gov
    importance: 3
  - domain: nih.gov            # WAF-blocked (see WAF-ALLOWLIST.md)
    importance: 1
  - domain: hhs.gov            # WAF-blocked (see WAF-ALLOWLIST.md)
    importance: 1

  # Department of Veterans Affairs — scanned ONLY via the "va" profile on
  # Hugging Face. hf_only: true prevents these from running in GitHub Actions.
  - domain: www.va.gov
    importance: 5
    hf_only: true
  - domain: volunteer.va.gov
    importance: 3
    hf_only: true
  - domain: news.va.gov
    importance: 3
    hf_only: true
  - domain: benefits.va.gov
    importance: 3
    hf_only: true
