version: "1.0"
profile: "US Health"
description: "Quality scanner profile targeting US federal health agency websites."

targets:
  - id: cms-gov
    name: Centers for Medicare & Medicaid Services
    base_url: https://www.cms.gov
    sitemap_url: https://www.cms.gov/sitemap.xml
    include_paths:
      - "/medicare/*"
      - "/medicaid/*"
    priority_urls:
      - https://www.cms.gov/medicare/physician-fee-schedule/search
      - https://www.cms.gov/about-cms
    settings:
      postLoadDelay: 2500
      maxTimeoutMs: 120000

  - id: hhs-gov
    name: U.S. Department of Health & Human Services
    base_url: https://www.hhs.gov
    # sitemap_url omitted: Akamai CDN returns 403 for all automated requests to /sitemap.xml
    include_paths:
      - "/healthcare/*"
      - "/programs/*"
    priority_urls:
      - https://www.hhs.gov/healthcare/index.html
    settings:
      postLoadDelay: 2000
      maxTimeoutMs: 120000

  - id: medicare-gov
    name: Medicare.gov
    base_url: https://www.medicare.gov
    sitemap_url: https://www.medicare.gov/sitemap.xml
    include_paths:
      - "/coverage/*"
      - "/basics/*"
    priority_urls:
      - https://www.medicare.gov/basics
      - https://www.medicare.gov/coverage
    settings:
      postLoadDelay: 2000
      maxTimeoutMs: 120000

  - id: medicaid-gov
    name: Medicaid.gov
    base_url: https://www.medicaid.gov
    sitemap_url: https://www.medicaid.gov/sitemap.xml
    include_paths:
      - "/medicaid/*"
      - "/state-overviews/*"
    priority_urls:
      - https://www.medicaid.gov/medicaid/index.html
      - https://www.medicaid.gov/state-overviews/index.html
    settings:
      postLoadDelay: 2000
      maxTimeoutMs: 120000

  - id: openpaymentsdata-cms-gov
    name: Open Payments Data (CMS)
    base_url: https://openpaymentsdata.cms.gov
    include_paths:
      - "/*"
    priority_urls:
      - https://openpaymentsdata.cms.gov/
    settings:
      postLoadDelay: 2000
      maxTimeoutMs: 120000

  - id: data-medicaid-gov
    name: Medicaid Data Portal
    base_url: https://data.medicaid.gov
    include_paths:
      - "/*"
    priority_urls:
      - https://data.medicaid.gov/
    settings:
      postLoadDelay: 2000
      maxTimeoutMs: 120000

  - id: data-healthcare-gov
    name: Healthcare Data Portal
    base_url: https://data.healthcare.gov
    include_paths:
      - "/datasets*"
    priority_urls:
      - https://data.healthcare.gov/datasets
    settings:
      postLoadDelay: 2000
      maxTimeoutMs: 120000

  - id: data-cms-gov
    name: CMS Data Portal
    base_url: https://data.cms.gov
    include_paths:
      - "/*"
    priority_urls:
      - https://data.cms.gov/
    settings:
      postLoadDelay: 2000
      maxTimeoutMs: 120000

  - id: healthcare-gov
    name: HealthCare.gov
    base_url: https://www.healthcare.gov
    sitemap_url: https://www.healthcare.gov/sitemap-index.xml
    include_paths:
      - "/coverage/*"
      - "/quick-guide/*"
      - "/glossary/*"
    priority_urls:
      - https://www.healthcare.gov/
      - https://www.healthcare.gov/quick-guide/
    settings:
      postLoadDelay: 2000
      maxTimeoutMs: 120000

  - id: cdc-gov
    name: CDC.gov
    base_url: https://www.cdc.gov
    sitemap_url: https://www.cdc.gov/wcms-auto-sitemap-index.xml
    include_paths:
      - "/about/*"
      - "/chronicdisease/*"
      - "/vaccines/*"
    priority_urls:
      - https://www.cdc.gov/
      - https://www.cdc.gov/about/
    settings:
      postLoadDelay: 2000
      maxTimeoutMs: 120000

  - id: nih-gov
    name: National Institutes of Health
    base_url: https://www.nih.gov
    # sitemap_url omitted: Cloudflare bot protection blocks all automated requests to /sitemap.xml
    include_paths:
      - "/health-information/*"
      - "/news-events/*"
      - "/research-training/*"
    priority_urls:
      - https://www.nih.gov/
      - https://www.nih.gov/health-information
    settings:
      postLoadDelay: 2000
      maxTimeoutMs: 120000

  - id: health-gov
    name: Health.gov
    base_url: https://health.gov
    sitemap_url: https://health.gov/sitemap.xml
    include_paths:
      - "/our-work/*"
      - "/news/*"
      - "/*"
    priority_urls:
      - https://health.gov/
      - https://health.gov/our-work/
    settings:
      postLoadDelay: 2000
      maxTimeoutMs: 120000
