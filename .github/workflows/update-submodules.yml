name: Update Tool Submodules

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  update-submodules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Update submodules to latest tracked commits
        run: |
          git submodule sync --recursive
          git submodule update --init --remote --recursive

      - name: Create pull request if submodules changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: update tool submodules'
          title: 'chore: update tool submodules'
          body: |
            Automated submodule update run.

            Updated third-party scanner submodules (for example axe-core) to latest upstream commits.
          branch: chore/update-tool-submodules
          delete-branch: true
          labels: |
            dependencies
            automation
