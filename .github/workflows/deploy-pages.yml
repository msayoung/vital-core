name: Validate Docs Bundle

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate docs bundle shape
        run: |
          set -euo pipefail
          required_files=(
            "docs/index.html"
          )

          missing=0
          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing required docs file: $file"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            echo "Docs bundle validation failed."
            exit 1
          fi

          echo "Docs bundle validation passed."
