# Aggregation and publishing.
#
# Triggered once each morning by schedule, manually by workflow_dispatch,
# or optionally from scan.yml by workflow_call when a manual scan is run
# with the run_report checkbox selected.
#
# It is intentionally not triggered by workflow_run. Automated scans and
# reports are separate by default.
#
# Steps, in order:
#   1. aggregate         : computes summaries from data/, writes docs/
#   2. prune             : removes page-level detail older than retention_weeks
#   3. commit            : writes summaries and retention marker back to data/
#   4. generate comment  : creates docs/comment.md
#   5. deploy            : publishes docs/ to GitHub Pages
#   6. post comment      : posts weekly Markdown summary to a pinned issue

name: report

on:
  schedule:
    # GitHub cron is UTC. 12:37 UTC is roughly 08:37 ET during daylight
    # saving time and 07:37 ET during standard time.
    - cron: '37 12 * * *'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: report
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.decide.outputs.publish }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_call" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "schedule" ]; then
            TODAY=$(date -u +%Y-%m-%d)
            LAST=$(cat data/.last-report-date 2>/dev/null || echo "")
            if [ "$LAST" = "$TODAY" ]; then
              echo "skip: already published $TODAY"
              echo "publish=false" >> "$GITHUB_OUTPUT"
            else
              echo "publish: scheduled report for $TODAY (last=$LAST)"
              echo "publish=true" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          echo "publish=false" >> "$GITHUB_OUTPUT"

  report:
    needs: gate
    if: needs.gate.outputs.publish == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=optional --ignore-scripts

      - name: Aggregate
        run: node src/aggregate.js

      - name: Prune old page-level detail
        run: node src/prune.js

      - name: Commit summaries and pruning
        run: |
          git config user.name "vital-scans[bot]"
          git config user.email "vital-scans@users.noreply.github.com"

          date -u +%Y-%m-%d > data/.last-report-date
          git add data/

          if git diff --cached --quiet; then
            echo "no data changes"
            exit 0
          fi

          git commit -m "report: summaries $(date -u +%Y-%m-%d)"

          for i in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi

            if ! git pull --rebase -X theirs origin "${GITHUB_REF_NAME}"; then
              git rebase --abort 2>/dev/null || true
              git reset --soft HEAD~1 2>/dev/null || true
              git pull --rebase origin "${GITHUB_REF_NAME}"
              git add data/
              git commit -m "report: summaries $(date -u +%Y-%m-%d)" || true
            fi

            sleep $((RANDOM % 8 + 2))
          done

          echo "push failed after retries" >&2
          exit 1

      - name: Generate issue comment
        env:
          PAGES_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: node src/issue-comment.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Post weekly summary to tracking issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('docs/comment.md', 'utf8');
            const title = 'Weekly scan reports';

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              creator: 'app/github-actions',
              per_page: 100,
            });

            let issue = issues.data.find(i => i.title === title);

            if (!issue) {
              const all = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100,
              });

              issue = all.data.find(i => i.title === title);
            }

            if (!issue) {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: 'Automated weekly accessibility and sustainability summaries are posted as comments here.',
              });

              issue = created.data;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body,
            });
