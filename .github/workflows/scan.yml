# Nightly incremental scans. Each run scans up to pages_per_run pages
# per domain; coverage accumulates across the week into one ISO-week
# dataset per domain.
#
# Off-hours: crons are UTC. These schedules target late evening through
# early morning US Eastern. During daylight saving time they run roughly
# 23:11-05:47 ET on weeknights and 21:13-07:37 ET on weekends.
# During standard time, they run one hour earlier.
#
# Commit safety: each matrix job writes only state/<domain>/ and
# data/<domain>/, so parallel jobs never touch the same files. The
# push step rebases and retries to absorb the race on the branch tip.

name: scan

on:
  schedule:
    # GitHub cron is UTC.
    # ET during daylight saving time: UTC-4.
    # ET during standard time: UTC-5.
    # These avoid :00 because GitHub delays top-of-hour schedules.

    # Weeknights: roughly 23:11-05:47 ET during EDT.
    - cron: '11 3 * * 1-5'   # ~23:11 ET previous evening
    - cron: '29 4 * * 1-5'   # ~00:29 ET
    - cron: '43 5 * * 1-5'   # ~01:43 ET
    - cron: '07 7 * * 1-5'   # ~03:07 ET
    - cron: '31 8 * * 1-5'   # ~04:31 ET
    - cron: '47 9 * * 1-5'   # ~05:47 ET

    # Weekend: roughly 21:13-07:37 ET during EDT.
    - cron: '13 1 * * 0,6'   # ~21:13 ET previous evening
    - cron: '27 2 * * 0,6'   # ~22:27 ET previous evening
    - cron: '41 3 * * 0,6'   # ~23:41 ET previous evening
    - cron: '09 5 * * 0,6'   # ~01:09 ET
    - cron: '23 6 * * 0,6'   # ~02:23 ET
    - cron: '37 7 * * 0,6'   # ~03:37 ET
    - cron: '51 8 * * 0,6'   # ~04:51 ET
    - cron: '19 10 * * 0,6'  # ~06:19 ET
    - cron: '37 11 * * 0,6'  # ~07:37 ET
  workflow_dispatch:
    inputs:
      domain:
        description: 'Scan a single domain (blank = all)'
        required: false
      budget:
        description: 'Override pages_per_run'
        required: false

permissions:
  contents: write

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      domains: ${{ steps.list.outputs.domains }}
    steps:
      # - uses: actions/checkout@v4
      - uses: actions/checkout@v5
      # - uses: actions/setup-node@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - id: list
        run: |
          npm ci --omit=optional --ignore-scripts
          if [ -n "${{ github.event.inputs.domain }}" ]; then
            echo "domains=[\"${{ github.event.inputs.domain }}\"]" >> "$GITHUB_OUTPUT"
          else
            node -e "
              import('./src/lib/config.js').then(({loadConfig}) => {
                console.log('domains=' + JSON.stringify(loadConfig().targets.map(t => t.domain)));
              })" >> "$GITHUB_OUTPUT"
          fi

  scan:
    needs: matrix
    runs-on: ubuntu-latest
    timeout-minutes: 110   # hard cap: keep each domain job under 2 hours
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        domain: ${{ fromJson(needs.matrix.outputs.domains) }}
    # Never let two runs scan the same domain at once.
    concurrency:
      group: scan-${{ matrix.domain }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Scan
        # Per-page audit memory is freed between pages (see alfa engine),
        # so heap should stay flat. The raised limit is headroom for the
        # occasional very large DOM, well under the runner's 16 GB.
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          BUDGET_FLAG=""
          if [ -n "${{ github.event.inputs.budget }}" ]; then
            BUDGET_FLAG="--budget ${{ github.event.inputs.budget }}"
          fi
          node src/scan.js --domain "${{ matrix.domain }}" $BUDGET_FLAG

      - name: Commit state and data
        run: |
          git config user.name "vital-scans[bot]"
          git config user.email "vital-scans@users.noreply.github.com"
          git add state/ data/
          if git diff --cached --quiet; then
            echo "no changes"; exit 0
          fi
          git commit -m "scan(${{ matrix.domain }}): $(date -u +%Y-%m-%dT%H:%MZ)"
          # Rebase-retry push. Parallel matrix jobs can race on the same
          # data/state files (two runs touching the same domain, or the
          # state crawl.json). These files are append-only and regenerable,
          # so -X theirs auto-resolves any conflict in favor of the incoming
          # branch tip — the push never fails on a merge conflict, and at
          # most a few pages re-scan next run. One job's race never blocks
          # the others.
          for i in 1 2 3 4 5; do
            if git push; then exit 0; fi
            if ! git pull --rebase -X theirs origin "${GITHUB_REF_NAME}"; then
              # Conflict -X theirs couldn't auto-resolve (e.g. delete/modify):
              # abort and re-stage our files onto the fresh tip.
              git rebase --abort 2>/dev/null || true
              git reset --soft HEAD~1 2>/dev/null || true
              git pull --rebase origin "${GITHUB_REF_NAME}"
              git add state/ data/
              git commit -m "scan(${{ matrix.domain }}): $(date -u +%Y-%m-%dT%H:%MZ)" || true
            fi
            sleep $((RANDOM % 10 + 2))
          done
          echo "push failed after retries" >&2
          exit 1
