# Nightly incremental scans. Each run scans up to pages_per_run pages
# per domain; coverage accumulates across the week into one ISO-week
# dataset per domain.
#
# Off-hours: crons are UTC. These schedules target late evening through
# early morning US Eastern. During daylight saving time they run roughly
# 23:11-05:47 ET on weeknights and 21:13-07:37 ET on weekends.
# During standard time, they run one hour earlier.
#
# Commit safety: each matrix job writes only state/<domain>/ and
# data/<domain>/, so parallel jobs never touch the same files. The
# push step rebases and retries to absorb the race on the branch tip.

name: scan

on:
  schedule:
    # GitHub cron is UTC.
    # ET during daylight saving time: UTC-4.
    # ET during standard time: UTC-5.
    # These avoid :00 because GitHub delays top-of-hour schedules.

    # Weeknights: roughly 23:11-05:47 ET during EDT.
    - cron: '11 3 * * 1-5'
    - cron: '29 4 * * 1-5'
    - cron: '43 5 * * 1-5'
    - cron: '07 7 * * 1-5'
    - cron: '31 8 * * 1-5'
    - cron: '47 9 * * 1-5'

    # Weekend: roughly 21:13-07:37 ET during EDT.
    - cron: '13 1 * * 0,6'
    - cron: '27 2 * * 0,6'
    - cron: '41 3 * * 0,6'
    - cron: '09 5 * * 0,6'
    - cron: '23 6 * * 0,6'
    - cron: '37 7 * * 0,6'
    - cron: '51 8 * * 0,6'
    - cron: '19 10 * * 0,6'
    - cron: '37 11 * * 0,6'

  workflow_dispatch:
    inputs:
      domain:
        description: 'Scan a single domain (blank = all)'
        required: false
      budget:
        description: 'Override pages_per_run'
        required: false
      run_report:
        description: 'Run report after this manual scan'
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  issues: write
  # Required for the optional-report job which calls report.yml via workflow_call.
  # GitHub grants the intersection of caller + callee permissions, so these must
  # be declared here even though the scan jobs themselves do not deploy to Pages.
  pages: write
  id-token: write

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      domains: ${{ steps.list.outputs.domains }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - id: list
        env:
          DISPATCH_DOMAIN: ${{ github.event.inputs.domain }}
        run: |
          npm ci --omit=optional --ignore-scripts
          if [ -n "$DISPATCH_DOMAIN" ]; then
            if ! printf '%s' "$DISPATCH_DOMAIN" | grep -qE '^[a-z0-9][a-z0-9._-]*\.[a-z]{2,}$'; then
              echo "::error::domain must be a valid hostname (e.g. www.cms.gov)"
              exit 1
            fi
            node -e "
              import('./src/lib/config.js').then(({loadConfig}) => {
                const d = process.env.DISPATCH_DOMAIN;
                const known = loadConfig().targets.filter(t => !t.hf_only).map(t => t.domain);
                if (!known.includes(d)) { console.error('Unknown or restricted domain: ' + d); process.exit(1); }
                console.log('domains=' + JSON.stringify([d]));
              }).catch(e => { console.error(String(e)); process.exit(1); })" >> "$GITHUB_OUTPUT"
          else
            node -e "
              import('./src/lib/config.js').then(({loadConfig}) => {
                const targets = loadConfig().targets.filter(t => !t.hf_only);
                console.log('domains=' + JSON.stringify(targets.map(t => t.domain)));
              })" >> "$GITHUB_OUTPUT"
          fi

  scan:
    needs: matrix
    runs-on: ubuntu-latest
    timeout-minutes: 110
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        domain: ${{ fromJson(needs.matrix.outputs.domains) }}

    concurrency:
      group: scan-${{ matrix.domain }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browser
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Check Wappalyzer vendor age
        run: |
          DATE=$(grep '^date:' vendor/wappalyzer/VERSION | awk '{print $2}')
          if [ -z "$DATE" ]; then
            echo "::warning::vendor/wappalyzer/VERSION has no date field - cannot check age"
            exit 0
          fi
          VENDOR_EPOCH=$(date -d "$DATE" +%s 2>/dev/null || date -j -f "%Y-%m-%d" "$DATE" +%s)
          NOW_EPOCH=$(date +%s)
          AGE_DAYS=$(( (NOW_EPOCH - VENDOR_EPOCH) / 86400 ))
          echo "Wappalyzer vendor age: ${AGE_DAYS} days (vendored ${DATE})"
          if [ "$AGE_DAYS" -gt 90 ]; then
            echo "::warning file=vendor/wappalyzer/VERSION::Wappalyzer fingerprints are ${AGE_DAYS} days old (vendored ${DATE}). Run scripts/update-wappalyzer.sh to refresh."
          fi

      - name: Scan
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          # Leave ~15 min for link-check flush, browser close, state save,
          # and the commit step. Must be less than timeout-minutes: 110.
          VITAL_SCAN_TIME_BUDGET_MINUTES: 95
          DISPATCH_BUDGET: ${{ github.event.inputs.budget }}
        run: |
          BUDGET_FLAG=""
          if [ -n "$DISPATCH_BUDGET" ]; then
            if ! printf '%s' "$DISPATCH_BUDGET" | grep -qE '^[0-9]+$'; then
              echo "::error::budget must be a positive integer"
              exit 1
            fi
            BUDGET_FLAG="--budget $DISPATCH_BUDGET"
          fi
          node src/scan.js --domain "${{ matrix.domain }}" $BUDGET_FLAG

      - name: Commit state and data
        if: always()
        run: |
          git config user.name "vital-scans[bot]"
          git config user.email "vital-scans@users.noreply.github.com"
          git add state/ data/
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "scan(${{ matrix.domain }}): $(date -u +%Y-%m-%dT%H:%MZ)"
          for i in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            if ! git pull --rebase -X theirs origin "${GITHUB_REF_NAME}"; then
              git rebase --abort 2>/dev/null || true
              git reset --soft HEAD~1 2>/dev/null || true
              git pull --rebase origin "${GITHUB_REF_NAME}"
              git add state/ data/
              git commit -m "scan(${{ matrix.domain }}): $(date -u +%Y-%m-%dT%H:%MZ)" || true
            fi
            sleep $((RANDOM % 10 + 2))
          done
          echo "push failed after retries" >&2
          exit 1

  optional-report:
    needs: scan
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_report }}
    uses: ./.github/workflows/report.yml
