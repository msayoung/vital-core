name: Scan Vital Core
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 4 * * *' # daily at 04:00 UTC (midnight ET)
  workflow_dispatch:
    inputs:
      intensity:
        description: "Scan intensity (standard or deep)"
        required: false
        default: "standard"
        type: choice
        options:
          - standard
          - deep
jobs:
  scan:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium
      - name: Run Scan Locally
        env:
          VITAL_ALFA_CMD: node_modules/.bin/alfa
          VITAL_TARGET_LIMIT: 5
          VITAL_SCAN_INTENSITY: ${{ github.event.inputs.intensity || 'standard' }}
        run: npm run scan:local
      - name: Upload results
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results
          path: ./tmp
      - name: Deploy to GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./tmp
          force_orphan: true
