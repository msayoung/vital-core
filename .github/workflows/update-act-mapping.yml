name: Update ACT Rule Mapping

on:
  schedule:
    # Run on the 1st of each month at 03:00 UTC, after the existing seed refresh
    - cron: '0 3 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  update-act-mapping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize Node.js Environment
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Regenerate ACT rule mapping from upstream sources
        run: node scripts/update-act-mapping.mjs

      - name: Create pull request if mapping changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: update W3C ACT rule mapping (axe + alfa)'
          title: 'chore: update W3C ACT rule mapping (axe + alfa)'
          body: |
            Automated monthly refresh of `src/data/act-mapping.json`.

            Sources:
            - **axe**: https://github.com/dequelabs/act-reports-axe/blob/main/reports/axe-core-mapping.json
            - **alfa**: https://github.com/act-rules/act-rules-implementation-alfa/blob/master/report.json

            The mapping is used by `ConsensusPrioritizer` to correlate axe and alfa findings
            via their shared W3C ACT rule IDs, and by `NormalizedFindingAdapter` to populate
            `standards.act` on each finding.

            Review the diff to confirm no unexpected rule additions or removals.
          branch: chore/update-act-mapping
          delete-branch: true
          labels: |
            dependencies
            automation
