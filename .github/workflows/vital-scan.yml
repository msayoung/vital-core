name: Execute Continuous Web Quality Compliance Scan

on:
  schedule:
      # Hourly cadence during off-hours (midnight‑6 am ET = 04‑10 UTC)
    - cron: '0 4-10 * * *'
  workflow_dispatch:
    # Allows repository maintainers to manually execute an on-demand scan
    inputs:
      force_rescan:
        description: 'Force full rescan of all discovered pages (ignore unchanged-page cache)'
        required: false
        type: boolean
        default: false
      force_priority_seed_refresh:
        description: 'Force refresh monthly DuckDuckGo priority URL seeds before scanning'
        required: false
        type: boolean
        default: false
      clear_history:
        description: 'Discard all prior run history and start a clean baseline (use with force_rescan=true)'
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Prevent two scan workflows from running simultaneously to avoid a Pages deployment race.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  # ─── Job 1: determine scan mode, refresh seeds if needed, fetch and upload history cache ───
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_scan: ${{ steps.offhours.outputs.should_scan }}
      scan_intensity: ${{ steps.offhours.outputs.scan_intensity }}
      deep_refresh: ${{ steps.offhours.outputs.deep_refresh }}
      monthly_seed_refresh: ${{ steps.offhours.outputs.monthly_seed_refresh }}
      audit_scope: ${{ steps.offhours.outputs.audit_scope }}
      enable_multi_engine: ${{ steps.engine_mode.outputs.enable_multi_engine }}
      # JSON array of target IDs, e.g. '["cms-gov","hhs-gov",...]'
      targets: ${{ steps.parse_profile.outputs.targets }}
    steps:
      - name: Checkout Source Repository Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Initialize Node.js Environment
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Determine scan mode for current time window
        id: offhours
        run: |
          set -euo pipefail
          echo "should_scan=true" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "scan_intensity=standard" >> "$GITHUB_OUTPUT"
            echo "deep_refresh=false" >> "$GITHUB_OUTPUT"
            echo "monthly_seed_refresh=false" >> "$GITHUB_OUTPUT"
            echo "audit_scope=full" >> "$GITHUB_OUTPUT"
            echo "Manual run detected. Running full incremental scan path."
            exit 0
          fi

          utc_hour=$(TZ=UTC date +%H)
          utc_dom=$(TZ=UTC date +%d)

          # Deep daily refresh at 05:00 UTC and monthly seed refresh at 02:00 UTC on day 1.
          if [[ "$utc_hour" == "05" || ("$utc_dom" == "01" && "$utc_hour" == "02") ]]; then
            echo "scan_intensity=deep" >> "$GITHUB_OUTPUT"
            echo "deep_refresh=true" >> "$GITHUB_OUTPUT"
            echo "audit_scope=full" >> "$GITHUB_OUTPUT"
            if [[ "$utc_dom" == "01" && "$utc_hour" == "02" ]]; then
              echo "monthly_seed_refresh=true" >> "$GITHUB_OUTPUT"
            else
              echo "monthly_seed_refresh=false" >> "$GITHUB_OUTPUT"
            fi
            echo "Deep refresh schedule detected. Running expanded scan mode."
            exit 0
          fi

          echo "monthly_seed_refresh=false" >> "$GITHUB_OUTPUT"

          et_day=$(TZ=America/New_York date +%u)
          et_hour=$(TZ=America/New_York date +%H)
          pt_day=$(TZ=America/Los_Angeles date +%u)
          pt_hour=$(TZ=America/Los_Angeles date +%H)

          # Weekday load bands:
          # - light: edge work hours
          # - ultra_light: peak overlap hours (highest traffic)
          # - standard: all off-hours and weekends
          if [[ "$et_day" -ge 1 && "$et_day" -le 5 && "$et_hour" -ge 9 && "$pt_day" -ge 1 && "$pt_day" -le 5 && "$pt_hour" -lt 17 ]]; then
            echo "deep_refresh=false" >> "$GITHUB_OUTPUT"
            echo "audit_scope=accessibility" >> "$GITHUB_OUTPUT"

            # Peak overlap in North America business hours: 11:00-16:59 ET.
            if [[ "$et_hour" -ge 11 && "$et_hour" -lt 17 ]]; then
              echo "scan_intensity=ultra_light" >> "$GITHUB_OUTPUT"
              echo "Peak business-hours overlap detected. Running extra-light incremental scan mode."
            else
              echo "scan_intensity=light" >> "$GITHUB_OUTPUT"
              echo "Business-hours edge window detected. Running light incremental scan mode."
            fi
          else
            echo "scan_intensity=standard" >> "$GITHUB_OUTPUT"
            echo "deep_refresh=false" >> "$GITHUB_OUTPUT"

            # Off-hours runs are accessibility-first by default, with full audit rotation every 6 UTC hours.
            if (( 10#$utc_hour % 6 == 0 )); then
              echo "audit_scope=full" >> "$GITHUB_OUTPUT"
            else
              echo "audit_scope=accessibility" >> "$GITHUB_OUTPUT"
            fi

            echo "Off-hours window detected. Running standard incremental scan mode."
          fi

      - name: Add fuzzy start delay for scheduled runs
        if: ${{ github.event_name == 'schedule' }}
        run: |
          set -euo pipefail
          jitter_seconds=$(( RANDOM % 241 ))
          echo "Applying crawl start jitter of ${jitter_seconds}s."
          sleep "$jitter_seconds"

      - name: Configure browser engine mode for this run
        id: engine_mode
        run: |
          set -euo pipefail
          intensity="${{ steps.offhours.outputs.scan_intensity }}"

          if [[ "$intensity" == "deep" || "$intensity" == "standard" ]]; then
            echo "enable_multi_engine=true" >> "$GITHUB_OUTPUT"
            echo "Engine mode: multi-engine (off-hours/deep window)."
          else
            echo "enable_multi_engine=false" >> "$GITHUB_OUTPUT"
            echo "Engine mode: chromium-only (business-hours window)."
          fi

      - name: Parse profile to extract target IDs for matrix
        id: parse_profile
        run: |
          targets=$(python3 -c "
          import yaml, json
          with open('profiles/us-health.yml') as f:
              profile = yaml.safe_load(f)
          ids = [t['id'] for t in profile.get('targets', [])]
          print(json.dumps(ids))
          ")
          echo "targets=$targets" >> "$GITHUB_OUTPUT"

      - name: Restore historical run data from current Pages site
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.clear_history == true) && steps.offhours.outputs.should_scan == 'true' }}
        env:
          VITAL_PAGES_BASE_URL: ${{ vars.VITAL_PAGES_BASE_URL || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}
          VITAL_HISTORY_CACHE_DIR: .history-cache
        run: node scripts/fetch-history.mjs

      - name: Install project dependencies for optional seed refresh
        if: ${{ steps.offhours.outputs.should_scan == 'true' && ((github.event_name == 'workflow_dispatch' && inputs.force_priority_seed_refresh == true) || steps.offhours.outputs.monthly_seed_refresh == 'true') }}
        run: npm ci

      - name: Refresh DuckDuckGo priority URL seeds
        if: ${{ steps.offhours.outputs.should_scan == 'true' && ((github.event_name == 'workflow_dispatch' && inputs.force_priority_seed_refresh == true) || steps.offhours.outputs.monthly_seed_refresh == 'true') }}
        env:
          VITAL_HISTORY_CACHE_DIR: .history-cache
        run: |
          npm run seeds:refresh profiles/us-health.yml
          # Copy the refreshed seeds back into the history cache so scan jobs pick them up.
          mkdir -p .history-cache/runs
          if [[ -f dist/runs/top-task-seeds.json ]]; then
            cp dist/runs/top-task-seeds.json .history-cache/runs/top-task-seeds.json
          fi

      - name: Upload history cache artifact for downstream jobs
        if: steps.offhours.outputs.should_scan == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: history-cache
          path: .history-cache/
          retention-days: 1
          if-no-files-found: ignore
          include-hidden-files: true

  # ─── Job 2: scan one target cluster per matrix runner in parallel ───
  scan:
    needs: setup
    if: needs.setup.outputs.should_scan == 'true'
    timeout-minutes: 58
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target_id: ${{ fromJson(needs.setup.outputs.targets) }}
    steps:
      - name: Checkout Source Repository Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Initialize Node.js Environment
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Download history cache from setup job
        uses: actions/download-artifact@v8
        with:
          name: history-cache
          path: .history-cache/
        continue-on-error: true

      - name: Cache Playwright browser binaries
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright Chromium with system dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright Chromium system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
          
      - name: Set Chrome path for Lighthouse
        id: set_chrome_path
        run: |
          CHROME_PATH=$(node scripts/get-chromium-path.mjs)
          echo "CHROME_PATH=$CHROME_PATH" >> $GITHUB_ENV
        shell: bash

      - name: Cache Wappalyzer venv
        uses: actions/cache@v5
        id: wappalyzer-cache
        with:
          path: .tools/wappalyzer-next
          key: wappalyzer-${{ runner.os }}-${{ hashFiles('.github/wappalyzer-requirements.txt') }}

      - name: Install Wappalyzer Next CLI (isolated venv)
        if: steps.wappalyzer-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          python3 -m venv .tools/wappalyzer-next
          .tools/wappalyzer-next/bin/python -m pip install --upgrade pip
          .tools/wappalyzer-next/bin/pip install -r .github/wappalyzer-requirements.txt

      - name: Install Playwright Firefox and WebKit with system dependencies (off-hours/deep)
        if: needs.setup.outputs.enable_multi_engine == 'true'
        run: npx playwright install firefox webkit --with-deps

      - name: Scan target cluster ${{ matrix.target_id }}
        env:
          VITAL_TARGET_ID: ${{ matrix.target_id }}
          VITAL_HISTORY_CACHE_DIR: .history-cache
          VITAL_SAMPLING_SEED: ${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.target_id }}
          VITAL_WAPPALYZER_CMD: .tools/wappalyzer-next/bin/wappalyzer
          VITAL_ALFA_CMD: ${{ env.VITAL_ALFA_CMD }}
          VITAL_AUDIT_SCOPE: ${{ needs.setup.outputs.audit_scope || 'full' }}
          FORCE_RESCAN: ${{ (github.event_name == 'workflow_dispatch' && inputs.force_rescan) || (github.event_name == 'schedule' && needs.setup.outputs.deep_refresh == 'true') || 'false' }}
          VITAL_REVALIDATE_AFTER_DAYS: ${{ needs.setup.outputs.scan_intensity == 'deep' && '0' || needs.setup.outputs.scan_intensity == 'ultra_light' && '7' || needs.setup.outputs.scan_intensity == 'light' && '4' || '2' }}
          VITAL_UPDATED_WITHIN_DAYS: ${{ needs.setup.outputs.scan_intensity == 'ultra_light' && '7' || needs.setup.outputs.scan_intensity == 'light' && '10' || '14' }}
          VITAL_UPDATED_RECHECK_HOURS: ${{ needs.setup.outputs.scan_intensity == 'deep' && '0' || needs.setup.outputs.scan_intensity == 'ultra_light' && '24' || needs.setup.outputs.scan_intensity == 'light' && '12' || '8' }}
          VITAL_MAX_TIMEOUT_MS: ${{ needs.setup.outputs.scan_intensity == 'deep' && '90000' || needs.setup.outputs.scan_intensity == 'ultra_light' && '60000' || needs.setup.outputs.scan_intensity == 'light' && '50000' || '45000' }}
          VITAL_SAME_SITE_DELAY_MS: ${{ needs.setup.outputs.scan_intensity == 'ultra_light' && '6000' || needs.setup.outputs.scan_intensity == 'light' && '3000' || '1500' }}
          VITAL_TIMEOUT_BACKOFF_THRESHOLD: '1'
          VITAL_TIMEOUT_BACKOFF_STEP_MS: ${{ needs.setup.outputs.scan_intensity == 'ultra_light' && '20000' || needs.setup.outputs.scan_intensity == 'light' && '15000' || '8000' }}
          VITAL_TIMEOUT_BACKOFF_MAX_MS: ${{ needs.setup.outputs.scan_intensity == 'ultra_light' && '90000' || needs.setup.outputs.scan_intensity == 'light' && '70000' || '50000' }}
          VITAL_MAX_RUN_MINUTES: ${{ needs.setup.outputs.scan_intensity == 'deep' && '14' || needs.setup.outputs.scan_intensity == 'standard' && '8' || needs.setup.outputs.scan_intensity == 'light' && '4' || '3' }}
          VITAL_DYNAMIC_BATCH_ENABLE: 'true'
          VITAL_BATCH_SIZE_BASE: '1'
          VITAL_BATCH_SIZE_MAX: ${{ needs.setup.outputs.scan_intensity == 'deep' && '10' || needs.setup.outputs.scan_intensity == 'standard' && '6' || needs.setup.outputs.scan_intensity == 'light' && '3' || '2' }}
          VITAL_BATCH_ESCALATION_SECONDS: '45'
          VITAL_ENABLE_MULTI_ENGINE: ${{ needs.setup.outputs.enable_multi_engine }}
        run: npm run scan

      - name: Upload scan artifact for ${{ matrix.target_id }}
        uses: actions/upload-artifact@v7
        with:
          name: scan-artifact-${{ matrix.target_id }}
          path: dist/scan-artifacts/
          retention-days: 1
          if-no-files-found: warn

      - name: Upload HTML snapshots for ${{ matrix.target_id }} (Debugging/Audit)
        uses: actions/upload-artifact@v7
        with:
          name: raw-cached-html-snapshots-${{ matrix.target_id }}
          path: tmp/html-snapshots/
          retention-days: 1
          if-no-files-found: ignore

  # ─── Job 3: merge all per-target artifacts, compile the dashboard, and deploy to Pages ───
  compile-and-deploy:
    needs: [setup, scan]
    # Run even if some (or all) scan matrix jobs failed or were cancelled so partial results are still published.
    # Using always() ensures this job runs even when the workflow is manually cancelled mid-run.
    if: ${{ always() && needs.setup.result == 'success' && needs.setup.outputs.should_scan == 'true' && (needs.scan.result == 'success' || needs.scan.result == 'failure' || needs.scan.result == 'cancelled') }}
    timeout-minutes: 20
    # Pages deployment requires this environment declaration.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout Source Repository Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Initialize Node.js Environment
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Download history cache
        uses: actions/download-artifact@v8
        with:
          name: history-cache
          path: .history-cache/
        continue-on-error: true

      - name: Download all per-target scan artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: scan-artifact-*
          path: dist/scan-artifacts/
          merge-multiple: true
        continue-on-error: true

      - name: Compile dashboard from collected scan artifacts
        env:
          VITAL_HISTORY_CACHE_DIR: .history-cache
        run: npm run compile

      - name: Verify required generated dashboard artifacts exist
        run: |
          set -euo pipefail
          required_files=(
            "dist/index.html"
            "dist/runs/latest.json"
            "dist/runs/latest-summary.json"
            "dist/runs/index.json"
            "dist/runs/trends.json"
            "dist/runs/software-by-domain.json"
            "dist/runs/page-state.json"
          )

          missing=0
          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing required generated file: $file"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            echo "Dashboard artifact preflight failed."
            exit 1
          fi

          echo "Dashboard artifact preflight passed."

      - name: Setup GitHub Pages Deployment Context
        uses: actions/configure-pages@v6

      - name: Package Generated Static Dashboard Build
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'dist/'

      - name: Deploy Compiled Dashboard directly to GitHub Pages Engine
        id: deployment
        uses: actions/deploy-pages@v5
