name: Execute Continuous Web Quality Compliance Scan

on:
  schedule:
    # Hourly incremental scans for continuous progress visibility
    - cron: '0 * * * *'
    # Daily deep refresh in US off-hours (00:00 ET / 21:00 PT during standard time)
    - cron: '0 5 * * *'
    # Monthly priority URL validation refresh in US off-hours
    - cron: '0 2 1 * *'
  workflow_dispatch:
    # Allows repository maintainers to manually execute an on-demand scan
    inputs:
      force_rescan:
        description: 'Force full rescan of all discovered pages (ignore unchanged-page cache)'
        required: false
        type: boolean
        default: false
      force_priority_seed_refresh:
        description: 'Force refresh monthly DuckDuckGo priority URL seeds before scanning'
        required: false
        type: boolean
        default: false

# Explicitly set permissions for native, secure GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  VITAL_ENABLE_MULTI_ENGINE: ${{ vars.VITAL_ENABLE_MULTI_ENGINE || 'false' }}

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  compliance-scan:
    timeout-minutes: 58
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Repository Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Initialize Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Monolithic Project Dependencies
        run: npm ci

      - name: Restore historical run data from current Pages site
        env:
          VITAL_PAGES_BASE_URL: ${{ vars.VITAL_PAGES_BASE_URL || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}
          VITAL_HISTORY_CACHE_DIR: .history-cache
        run: npm run history:fetch

      - name: Install Playwright Browser Binaries
        run: |
          set -euo pipefail
          if [[ "${VITAL_ENABLE_MULTI_ENGINE}" == "true" ]]; then
            echo "Installing Chromium + Firefox + WebKit for multi-engine mode..."
            npx playwright install chromium firefox webkit --with-deps
          else
            echo "Installing Chromium only (default mode)."
            npx playwright install chromium --with-deps
          fi

      - name: Determine scan mode for current time window
        id: offhours
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "should_scan=true" >> "$GITHUB_OUTPUT"
            echo "scan_intensity=standard" >> "$GITHUB_OUTPUT"
            echo "deep_refresh=false" >> "$GITHUB_OUTPUT"
            echo "Manual run detected. Running full incremental scan path."
            exit 0
          fi

          if [[ "${{ github.event.schedule }}" == '0 5 * * *' || "${{ github.event.schedule }}" == '0 2 1 * *' ]]; then
            echo "should_scan=true" >> "$GITHUB_OUTPUT"
            echo "scan_intensity=deep" >> "$GITHUB_OUTPUT"
            echo "deep_refresh=true" >> "$GITHUB_OUTPUT"
            echo "Deep refresh schedule detected. Running expanded scan mode."
            exit 0
          fi

          et_day=$(TZ=America/New_York date +%u)
          et_hour=$(TZ=America/New_York date +%H)
          pt_day=$(TZ=America/Los_Angeles date +%u)
          pt_hour=$(TZ=America/Los_Angeles date +%H)

          # Weekday load bands:
          # - light: edge work hours
          # - ultra_light: peak overlap hours (highest traffic)
          # - standard: all off-hours and weekends
          if [[ "$et_day" -ge 1 && "$et_day" -le 5 && "$et_hour" -ge 9 && "$pt_day" -ge 1 && "$pt_day" -le 5 && "$pt_hour" -lt 17 ]]; then
            echo "should_scan=true" >> "$GITHUB_OUTPUT"
            echo "deep_refresh=false" >> "$GITHUB_OUTPUT"

            # Peak overlap in North America business hours: 11:00-16:59 ET.
            if [[ "$et_hour" -ge 11 && "$et_hour" -lt 17 ]]; then
              echo "scan_intensity=ultra_light" >> "$GITHUB_OUTPUT"
              echo "Peak business-hours overlap detected. Running extra-light incremental scan mode."
            else
              echo "scan_intensity=light" >> "$GITHUB_OUTPUT"
              echo "Business-hours edge window detected. Running light incremental scan mode."
            fi
          else
            echo "should_scan=true" >> "$GITHUB_OUTPUT"
            echo "scan_intensity=standard" >> "$GITHUB_OUTPUT"
            echo "deep_refresh=false" >> "$GITHUB_OUTPUT"
            echo "Off-hours window detected. Running standard incremental scan mode."
          fi

      - name: Run VITAL-Core Core Orchestrator Pipeline
        if: steps.offhours.outputs.should_scan == 'true'
        env:
          VITAL_HISTORY_CACHE_DIR: .history-cache
          VITAL_SAMPLING_SEED: ${{ github.run_id }}-${{ github.run_attempt }}
          FORCE_RESCAN: ${{ (github.event_name == 'workflow_dispatch' && inputs.force_rescan) || (github.event_name == 'schedule' && steps.offhours.outputs.deep_refresh == 'true') || 'false' }}
          FORCE_PRIORITY_SEED_REFRESH: ${{ (github.event_name == 'workflow_dispatch' && inputs.force_priority_seed_refresh) || (github.event_name == 'schedule' && github.event.schedule == '0 2 1 * *') || 'false' }}
          VITAL_REVALIDATE_AFTER_DAYS: ${{ steps.offhours.outputs.scan_intensity == 'ultra_light' && '30' || steps.offhours.outputs.scan_intensity == 'light' && '21' || '7' }}
          VITAL_UPDATED_WITHIN_DAYS: ${{ steps.offhours.outputs.scan_intensity == 'ultra_light' && '2' || steps.offhours.outputs.scan_intensity == 'light' && '3' || '7' }}
          VITAL_MAX_RUN_MINUTES: '52'
          VITAL_ENABLE_MULTI_ENGINE: ${{ env.VITAL_ENABLE_MULTI_ENGINE }}
        run: npm run scan

      - name: Verify required generated dashboard artifacts exist
        if: steps.offhours.outputs.should_scan == 'true'
        run: |
          set -euo pipefail
          required_files=(
            "dist/index.html"
            "dist/runs/latest.json"
            "dist/runs/index.json"
            "dist/runs/trends.json"
            "dist/runs/page-state.json"
          )

          missing=0
          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing required generated file: $file"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            echo "Dashboard artifact preflight failed."
            exit 1
          fi

          echo "Dashboard artifact preflight passed."

      - name: Upload Local Snapshots as Workflow Artifacts (Debugging/Audit)
        if: steps.offhours.outputs.should_scan == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: raw-cached-html-snapshots
          path: tmp/html-snapshots/
          retention-days: 7

      - name: Setup GitHub Pages Deployment Context
        if: steps.offhours.outputs.should_scan == 'true'
        uses: actions/configure-pages@v4

      - name: Package Generated Static Dashboard Build
        if: steps.offhours.outputs.should_scan == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist/'

      - name: Deploy Compiled Dashboard directly to GitHub Pages Engine
        if: steps.offhours.outputs.should_scan == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
