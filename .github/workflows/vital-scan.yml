name: Execute Continuous Web Quality Compliance Scan

on:
  schedule:
    # 10-minute trigger; special modes are derived from UTC day/hour below.
    - cron: '*/10 * * * *'
  workflow_dispatch:
    # Allows repository maintainers to manually execute an on-demand scan
    inputs:
      force_rescan:
        description: 'Force full rescan of all discovered pages (ignore unchanged-page cache)'
        required: false
        type: boolean
        default: false
      force_priority_seed_refresh:
        description: 'Force refresh monthly DuckDuckGo priority URL seeds before scanning'
        required: false
        type: boolean
        default: false

# Explicitly set permissions for native, secure GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  compliance-scan:
    timeout-minutes: 58
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Repository Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Initialize Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Monolithic Project Dependencies
        run: npm ci

      - name: Restore historical run data from current Pages site
        env:
          VITAL_PAGES_BASE_URL: ${{ vars.VITAL_PAGES_BASE_URL || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}
          VITAL_HISTORY_CACHE_DIR: .history-cache
        run: npm run history:fetch

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Install Wappalyzer Next CLI (isolated venv)
        run: |
          set -euo pipefail
          python3 -m venv .tools/wappalyzer-next
          .tools/wappalyzer-next/bin/python -m pip install --upgrade pip
          .tools/wappalyzer-next/bin/pip install 'git+https://github.com/s0md3v/wappalyzer-next.git'

      - name: Determine scan mode for current time window
        id: offhours
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "should_scan=true" >> "$GITHUB_OUTPUT"
            echo "scan_intensity=standard" >> "$GITHUB_OUTPUT"
            echo "deep_refresh=false" >> "$GITHUB_OUTPUT"
            echo "monthly_seed_refresh=false" >> "$GITHUB_OUTPUT"
            echo "audit_scope=full" >> "$GITHUB_OUTPUT"
            echo "Manual run detected. Running full incremental scan path."
            exit 0
          fi

          utc_hour=$(TZ=UTC date +%H)
          utc_dom=$(TZ=UTC date +%d)

          # Deep daily refresh at 05:00 UTC and monthly seed refresh at 02:00 UTC on day 1.
          if [[ "$utc_hour" == "05" || ("$utc_dom" == "01" && "$utc_hour" == "02") ]]; then
            echo "should_scan=true" >> "$GITHUB_OUTPUT"
            echo "scan_intensity=deep" >> "$GITHUB_OUTPUT"
            echo "deep_refresh=true" >> "$GITHUB_OUTPUT"
            echo "audit_scope=full" >> "$GITHUB_OUTPUT"
            if [[ "$utc_dom" == "01" && "$utc_hour" == "02" ]]; then
              echo "monthly_seed_refresh=true" >> "$GITHUB_OUTPUT"
            else
              echo "monthly_seed_refresh=false" >> "$GITHUB_OUTPUT"
            fi
            echo "Deep refresh schedule detected. Running expanded scan mode."
            exit 0
          fi

          echo "monthly_seed_refresh=false" >> "$GITHUB_OUTPUT"

          et_day=$(TZ=America/New_York date +%u)
          et_hour=$(TZ=America/New_York date +%H)
          pt_day=$(TZ=America/Los_Angeles date +%u)
          pt_hour=$(TZ=America/Los_Angeles date +%H)

          # Weekday load bands:
          # - light: edge work hours
          # - ultra_light: peak overlap hours (highest traffic)
          # - standard: all off-hours and weekends
          if [[ "$et_day" -ge 1 && "$et_day" -le 5 && "$et_hour" -ge 9 && "$pt_day" -ge 1 && "$pt_day" -le 5 && "$pt_hour" -lt 17 ]]; then
            echo "should_scan=true" >> "$GITHUB_OUTPUT"
            echo "deep_refresh=false" >> "$GITHUB_OUTPUT"
            echo "audit_scope=accessibility" >> "$GITHUB_OUTPUT"

            # Peak overlap in North America business hours: 11:00-16:59 ET.
            if [[ "$et_hour" -ge 11 && "$et_hour" -lt 17 ]]; then
              echo "scan_intensity=ultra_light" >> "$GITHUB_OUTPUT"
              echo "Peak business-hours overlap detected. Running extra-light incremental scan mode."
            else
              echo "scan_intensity=light" >> "$GITHUB_OUTPUT"
              echo "Business-hours edge window detected. Running light incremental scan mode."
            fi
          else
            echo "should_scan=true" >> "$GITHUB_OUTPUT"
            echo "scan_intensity=standard" >> "$GITHUB_OUTPUT"
            echo "deep_refresh=false" >> "$GITHUB_OUTPUT"

            # Off-hours runs are accessibility-first by default, with full audit rotation every 6 UTC hours.
            if (( 10#$utc_hour % 6 == 0 )); then
              echo "audit_scope=full" >> "$GITHUB_OUTPUT"
            else
              echo "audit_scope=accessibility" >> "$GITHUB_OUTPUT"
            fi

            echo "Off-hours window detected. Running standard incremental scan mode."
          fi

      - name: Configure browser engine mode for this run
        id: engine_mode
        run: |
          set -euo pipefail
          intensity="${{ steps.offhours.outputs.scan_intensity }}"

          if [[ "$intensity" == "deep" || "$intensity" == "standard" ]]; then
            echo "enable_multi_engine=true" >> "$GITHUB_OUTPUT"
            echo "Engine mode: multi-engine (off-hours/deep window)."
          else
            echo "enable_multi_engine=false" >> "$GITHUB_OUTPUT"
            echo "Engine mode: chromium-only (business-hours window)."
          fi

      - name: Install Playwright Firefox and WebKit (off-hours/deep)
        if: steps.engine_mode.outputs.enable_multi_engine == 'true'
        run: npx playwright install firefox webkit --with-deps

      - name: Run VITAL-Core Core Orchestrator Pipeline
        if: steps.offhours.outputs.should_scan == 'true'
        env:
          VITAL_HISTORY_CACHE_DIR: .history-cache
          VITAL_SAMPLING_SEED: ${{ github.run_id }}-${{ github.run_attempt }}
          VITAL_WAPPALYZER_CMD: .tools/wappalyzer-next/bin/wappalyzer
          VITAL_AUDIT_SCOPE: ${{ steps.offhours.outputs.audit_scope || 'full' }}
          FORCE_RESCAN: ${{ (github.event_name == 'workflow_dispatch' && inputs.force_rescan) || (github.event_name == 'schedule' && steps.offhours.outputs.deep_refresh == 'true') || 'false' }}
          FORCE_PRIORITY_SEED_REFRESH: ${{ (github.event_name == 'workflow_dispatch' && inputs.force_priority_seed_refresh) || (github.event_name == 'schedule' && steps.offhours.outputs.monthly_seed_refresh == 'true') || 'false' }}
          VITAL_REVALIDATE_AFTER_DAYS: ${{ steps.offhours.outputs.scan_intensity == 'deep' && '0' || steps.offhours.outputs.scan_intensity == 'ultra_light' && '7' || steps.offhours.outputs.scan_intensity == 'light' && '4' || '2' }}
          VITAL_UPDATED_WITHIN_DAYS: ${{ steps.offhours.outputs.scan_intensity == 'ultra_light' && '7' || steps.offhours.outputs.scan_intensity == 'light' && '10' || '14' }}
          VITAL_UPDATED_RECHECK_HOURS: ${{ steps.offhours.outputs.scan_intensity == 'deep' && '0' || steps.offhours.outputs.scan_intensity == 'ultra_light' && '24' || steps.offhours.outputs.scan_intensity == 'light' && '12' || '8' }}
          VITAL_MAX_TIMEOUT_MS: ${{ steps.offhours.outputs.scan_intensity == 'deep' && '90000' || steps.offhours.outputs.scan_intensity == 'ultra_light' && '60000' || steps.offhours.outputs.scan_intensity == 'light' && '50000' || '45000' }}
          VITAL_SAME_SITE_DELAY_MS: ${{ steps.offhours.outputs.scan_intensity == 'ultra_light' && '6000' || steps.offhours.outputs.scan_intensity == 'light' && '3000' || '1500' }}
          VITAL_TIMEOUT_BACKOFF_THRESHOLD: '1'
          VITAL_TIMEOUT_BACKOFF_STEP_MS: ${{ steps.offhours.outputs.scan_intensity == 'ultra_light' && '20000' || steps.offhours.outputs.scan_intensity == 'light' && '15000' || '8000' }}
          VITAL_TIMEOUT_BACKOFF_MAX_MS: ${{ steps.offhours.outputs.scan_intensity == 'ultra_light' && '90000' || steps.offhours.outputs.scan_intensity == 'light' && '70000' || '50000' }}
          VITAL_MAX_RUN_MINUTES: ${{ steps.offhours.outputs.scan_intensity == 'deep' && '14' || steps.offhours.outputs.scan_intensity == 'standard' && '8' || steps.offhours.outputs.scan_intensity == 'light' && '4' || '3' }}
          VITAL_DYNAMIC_BATCH_ENABLE: 'true'
          VITAL_BATCH_SIZE_BASE: '1'
          VITAL_BATCH_SIZE_MAX: ${{ steps.offhours.outputs.scan_intensity == 'deep' && '10' || steps.offhours.outputs.scan_intensity == 'standard' && '6' || steps.offhours.outputs.scan_intensity == 'light' && '3' || '2' }}
          VITAL_BATCH_ESCALATION_SECONDS: '45'
          VITAL_ENABLE_MULTI_ENGINE: ${{ steps.engine_mode.outputs.enable_multi_engine }}
        run: npm run scan

      - name: Verify required generated dashboard artifacts exist
        if: steps.offhours.outputs.should_scan == 'true'
        run: |
          set -euo pipefail
          required_files=(
            "dist/index.html"
            "dist/runs/latest.json"
            "dist/runs/index.json"
            "dist/runs/trends.json"
            "dist/runs/page-state.json"
          )

          missing=0
          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing required generated file: $file"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            echo "Dashboard artifact preflight failed."
            exit 1
          fi

          echo "Dashboard artifact preflight passed."

      - name: Upload Local Snapshots as Workflow Artifacts (Debugging/Audit)
        if: steps.offhours.outputs.should_scan == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: raw-cached-html-snapshots
          path: tmp/html-snapshots/
          retention-days: 7

      - name: Setup GitHub Pages Deployment Context
        if: steps.offhours.outputs.should_scan == 'true'
        uses: actions/configure-pages@v4

      - name: Package Generated Static Dashboard Build
        if: steps.offhours.outputs.should_scan == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist/'

      - name: Deploy Compiled Dashboard directly to GitHub Pages Engine
        if: steps.offhours.outputs.should_scan == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
