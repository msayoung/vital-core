name: Execute Continuous Web Quality Compliance Scan

on:
  schedule:
    # Triggers every Friday night at midnight UTC
    - cron: '0 0 * * 5'
    # Triggers on the first day of every month for priority URL validation refresh
    - cron: '0 2 1 * *'
  workflow_dispatch:
    # Allows repository maintainers to manually execute an on-demand scan
    inputs:
      force_rescan:
        description: 'Force full rescan of all discovered pages (ignore unchanged-page cache)'
        required: false
        type: boolean
        default: false
      force_priority_seed_refresh:
        description: 'Force refresh monthly DuckDuckGo priority URL seeds before scanning'
        required: false
        type: boolean
        default: false

# Explicitly set permissions for native, secure GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  compliance-scan:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Repository Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Initialize Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Monolithic Project Dependencies
        run: npm ci

      - name: Restore historical run data from current Pages site
        env:
          VITAL_PAGES_BASE_URL: ${{ vars.VITAL_PAGES_BASE_URL || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}
          VITAL_HISTORY_CACHE_DIR: .history-cache
        run: npm run history:fetch

      - name: Cache and Install Playwright Chromium Binary
        run: npx playwright install chromium --with-deps

      - name: Run VITAL-Core Core Orchestrator Pipeline
        env:
          VITAL_HISTORY_CACHE_DIR: .history-cache
          FORCE_RESCAN: ${{ (github.event_name == 'workflow_dispatch' && inputs.force_rescan) || 'false' }}
          FORCE_PRIORITY_SEED_REFRESH: ${{ (github.event_name == 'workflow_dispatch' && inputs.force_priority_seed_refresh) || (github.event_name == 'schedule' && github.event.schedule == '0 2 1 * *') || 'false' }}
        run: npm run scan

      - name: Verify required generated dashboard artifacts exist
        run: |
          set -euo pipefail
          required_files=(
            "dist/index.html"
            "dist/runs/latest.json"
            "dist/runs/index.json"
            "dist/runs/trends.json"
            "dist/runs/page-state.json"
          )

          missing=0
          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing required generated file: $file"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            echo "Dashboard artifact preflight failed."
            exit 1
          fi

          echo "Dashboard artifact preflight passed."

      - name: Upload Local Snapshots as Workflow Artifacts (Debugging/Audit)
        uses: actions/upload-artifact@v4
        with:
          name: raw-cached-html-snapshots
          path: tmp/html-snapshots/
          retention-days: 7

      - name: Setup GitHub Pages Deployment Context
        uses: actions/configure-pages@v4

      - name: Package Generated Static Dashboard Build
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist/'

      - name: Deploy Compiled Dashboard directly to GitHub Pages Engine
        id: deployment
        uses: actions/deploy-pages@v4
