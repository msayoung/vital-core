name: Governance Guardrails

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  required-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify required governance files exist
        run: |
          set -euo pipefail
          required_files=(
            "CONSTITUTION.md"
            "AGENTS.md"
            "ACCESSIBILITY.md"
            ".github/PULL_REQUEST_TEMPLATE.md"
            ".github/ISSUE_TEMPLATE/accessibility-bug.yml"
          )

          missing=0
          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing required governance file: $file"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

  governance-rationale:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Require Governance Impact section when governance files change
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          changed_files=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          governance_changed=0

          while IFS= read -r file; do
            case "$file" in
              CONSTITUTION.md|AGENTS.md|ACCESSIBILITY.md)
                governance_changed=1
                ;;
            esac
          done <<< "$changed_files"

          if [[ "$governance_changed" -eq 0 ]]; then
            echo "No governance files changed."
            exit 0
          fi

          if [[ -z "${PR_BODY:-}" ]]; then
            echo "PR body is empty. Add the Governance Impact section."
            exit 1
          fi

          if ! grep -qi "governance impact" <<< "$PR_BODY"; then
            echo "Governance files changed, but PR body is missing a Governance Impact section."
            exit 1
          fi

          echo "Governance Impact section present."
